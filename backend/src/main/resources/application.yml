server:
  port: 8080

spring:
  application:
    name: ai-tutor-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ai_tutor}
    username: ${DATABASE_USERNAME:ai_tutor}
    password: ${DATABASE_PASSWORD:ai_tutor}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

ai-tutor:
  storage:
    local-root: ${LOCAL_STORAGE_ROOT:../local-storage}
  worker:
    base-url: ${PYTHON_WORKER_BASE_URL:http://localhost:8000}
